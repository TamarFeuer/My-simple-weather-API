<!-- When the selection changes, dispatch monthSelected to the store.
     #monthSelect is a reference to this <select>; .value is the chosen month. -->
<select #monthSelect (change)="onMonthChange(monthSelect.value)">
  <option value="" disabled selected>Choose a month</option>
  @for (month of months; track month) {
    <option [value]="month">{{ month }}</option>
  }
</select>
